<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>I Needed This Magazine</title>
  <style>
    body {
      background-image: url('background.png'); /* repeated background */
      background-repeat: repeat;
      background-position: top left;
      font-family: Helvetica, Arial, sans-serif;
      font-weight: bold; /* all text bold */
      margin: 0;
      padding: 20px;
    }

    /* Header photo */
    .photo {
      display: block;
      margin: 20px auto;
      width: 500px;
      height: auto;
    }

    /* White box around the main title */
    .title-box {
      background: rgba(255, 255, 255, 0.9); /* almost opaque white */
      display: inline-block; /* shrink-wrap the content */
      padding: 10px 20px;
      margin-bottom: 30px;
    }

    /* White boxes around blog posts */
    .post {
      background: rgba(255, 255, 255, 0.9); /* semi-white */
      padding: 15px 20px;
      margin-bottom: 20px;
      max-width: 800px; /* optional, keeps box from being too wide */
      border-radius: 5px; /* slightly rounded corners */
    }

    /* Optional: center the post boxes */
    .post, .title-box {
      margin-left: auto;
      margin-right: auto;
    }

    /* Italicize dates inside posts */
    .post em {
      font-weight: normal; /* dates not bold if you prefer */
    }
  </style>
</head>
